<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador de Funcionarios GCBA</title>
<style>
:root {
  --bg: #071426;
  --panel: #0b2341;
  --text: #eef5ff;
  --muted: #b9c8dc;
  --line: #dce6f2;
  --row: #f5f8fc;
  --hover: #e7f1ff;
}
* { box-sizing: border-box; }
body {
  font-family: "Segoe UI", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
  min-height: 100vh;
}
header {
  padding: 28px 16px 12px;
  text-align: center;
}
h1 {
  font-size: 30px;
  color: #ffffff;
  margin: 0;
  letter-spacing: 0;
}
header p {
  color: var(--muted);
  margin: 8px auto 18px;
  max-width: 820px;
  line-height: 1.4;
}
.searchbar {
  display: flex;
  gap: 10px;
  width: min(920px, 92%);
  margin: 0 auto;
}
input {
  flex: 1;
  min-width: 0;
  padding: 14px 16px;
  font-size: 16px;
  color: #0b1728;
  border: 1px solid #c8d7ea;
  border-radius: 8px;
  outline: none;
  box-shadow: 0 10px 28px rgba(0,0,0,.18);
}
input:focus {
  border-color: #64a6ff;
  box-shadow: 0 0 0 3px rgba(100,166,255,.24), 0 10px 28px rgba(0,0,0,.18);
}
button {
  padding: 11px 24px;
  font-size: 16px;
  background: #ffffff;
  color: #0b2341;
  border: 1px solid #dce8f7;
  border-radius: 8px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 8px 18px rgba(0,0,0,.16);
}
button:hover { background: #dcecff; }
#meta {
  width: min(1320px, 96%);
  margin: 10px auto 0;
  text-align: center;
  color: #d6e5f8;
}
.table-wrap {
  width: min(1320px, 96%);
  margin: 18px auto 28px;
  overflow: auto;
  border-radius: 8px;
  box-shadow: 0 18px 38px rgba(0,0,0,.24);
}
table {
  width: 100%;
  border-collapse: collapse;
  background: #ffffff;
  color: #102033;
}
th, td {
  border-bottom: 1px solid var(--line);
  padding: 9px 10px;
  text-align: left;
  font-size: 13px;
  vertical-align: top;
}
th {
  background: var(--panel);
  color: #ffffff;
  position: sticky;
  top: 0;
  font-weight: 700;
  white-space: nowrap;
}
tbody tr:nth-child(even) { background: var(--row); }
tbody tr:hover { background: var(--hover); }
.warn {
  width: min(860px, 86%);
  margin: 18px auto;
  padding: 14px 16px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.16);
  border-radius: 8px;
  text-align: center;
}
@media (max-width: 720px) {
  .searchbar { display: block; }
  button { width: 100%; margin-top: 10px; }
  h1 { font-size: 24px; }
}
</style>
</head>
<body>
<header>
  <h1>Buscador de Funcionarios GCBA</h1>
  <p>Busca por nombre, apellido, CUIL, mail, sigla, ministerio o decreto. Tambien admite columna:valor.</p>
  <div class="searchbar">
    <input type="text" id="search" placeholder="Buscar por cualquier campo o usar columna:valor" autofocus>
    <button id="searchButton">Buscar</button>
  </div>
</header>
<div id="meta">Cargando base...</div>
<div id="resultados"></div>

<script>
let rows = [];
let columns = [];

const input = document.getElementById("search");
const button = document.getElementById("searchButton");
const meta = document.getElementById("meta");
const resultados = document.getElementById("resultados");

button.addEventListener("click", buscar);
input.addEventListener("keydown", (event) => {
  if (event.key === "Enter") buscar();
});

fetch("data.json")
  .then((response) => {
    if (!response.ok) throw new Error("No se pudo cargar data.json");
    return response.json();
  })
  .then((data) => {
    rows = Array.isArray(data) ? data : [];
    columns = rows.length ? Object.keys(rows[0]) : [];
    meta.innerHTML = `Base cargada: <b>${rows.length}</b> registros`;
  })
  .catch((error) => {
    meta.innerHTML = "";
    resultados.innerHTML = `<p class="warn">${escapeHtml(error.message)}</p>`;
  });

function normalizeText(value) {
  return String(value ?? "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim();
}

function buscar() {
  const term = input.value.trim();
  if (!term) {
    meta.innerHTML = `Base cargada: <b>${rows.length}</b> registros`;
    resultados.innerHTML = "";
    return;
  }

  let column = null;
  let value = term;
  if (term.includes(":")) {
    const parts = term.split(":");
    const maybeColumn = normalizeText(parts.shift());
    const maybeValue = parts.join(":").trim();
    const found = columns.find((col) => normalizeText(col) === maybeColumn);
    if (found && maybeValue) {
      column = found;
      value = maybeValue;
    }
  }

  const needle = normalizeText(value);
  const filtered = rows.filter((row) => {
    if (column) return normalizeText(row[column]).includes(needle);
    return columns.some((col) => normalizeText(row[col]).includes(needle));
  });

  meta.innerHTML = `Resultados: <b>${filtered.length}</b>`;
  if (!filtered.length) {
    resultados.innerHTML = `<p class="warn">No se encontraron resultados</p>`;
    return;
  }
  resultados.innerHTML = renderTable(filtered);
}

function renderTable(data) {
  const visibleColumns = columns.filter((col) => data.some((row) => String(row[col] ?? "").trim() !== ""));
  let html = `<div class="table-wrap"><table><thead><tr>`;
  html += visibleColumns.map((col) => `<th>${escapeHtml(col)}</th>`).join("");
  html += `</tr></thead><tbody>`;
  for (const row of data) {
    html += `<tr>`;
    html += visibleColumns.map((col) => `<td>${escapeHtml(row[col])}</td>`).join("");
    html += `</tr>`;
  }
  html += `</tbody></table></div>`;
  return html;
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
</script>
</body>
</html>
